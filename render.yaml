# Render Blueprint - Infrastructure as Code

services:
  - type: web
    name: faceconnect-api
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements-render.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: faceconnect
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: EMERGENT_API_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
