name: Build Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check directory structure
        run: |
          echo "Current directory:"
          pwd
          echo ""
          echo "Root contents:"
          ls -la
          echo ""
          echo "Frontend folder:"
          ls -la frontend/ || echo "frontend folder not found"
        shell: bash

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --ignore-engines --network-timeout 100000
        continue-on-error: false

      - name: Build React app
        working-directory: frontend
        env:
          CI: false
          DISABLE_ESLINT_PLUGIN: true
          GENERATE_SOURCEMAP: false
        run: yarn build

      - name: Verify build output
        working-directory: frontend
        run: |
          echo "Build folder contents:"
          ls -la build/ || echo "build folder not found"
        shell: bash

      - name: Build Windows Installer
        working-directory: frontend
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist folder
        working-directory: frontend
        run: |
          echo "Dist folder contents:"
          ls -la dist/ || echo "dist folder not found"
        shell: bash
        
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: FaceConnect-Windows-Setup
          path: frontend/dist/*.exe
          retention-days: 30
          if-no-files-found: warn
