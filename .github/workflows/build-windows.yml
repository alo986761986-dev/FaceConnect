name: Build Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish as GitHub Release'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from package.json
        id: version
        shell: powershell
        run: |
          $version = (Get-Content frontend/package.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Install and Build
        shell: powershell
        run: |
          cd frontend
          npm install -g yarn
          yarn install --ignore-engines
          $env:CI="false"
          $env:DISABLE_ESLINT_PLUGIN="true"
          $env:REACT_APP_BACKEND_URL="https://profile-connector-3.emergent.host"
          $env:GENERATE_SOURCEMAP="false"
          yarn build
        env:
          REACT_APP_BACKEND_URL: https://profile-connector-3.emergent.host

      - name: Build Electron App
        shell: powershell
        run: |
          cd frontend
          npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FaceConnect-Setup-v${{ steps.version.outputs.VERSION }}
          path: |
            frontend/dist/*.exe
            frontend/dist/*.exe.blockmap
            frontend/dist/latest.yml
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: FaceConnect v${{ steps.version.outputs.VERSION }}
          body: |
            ## FaceConnect v${{ steps.version.outputs.VERSION }}
            
            ### Installation
            Download and run `FaceConnect-Setup-${{ steps.version.outputs.VERSION }}.exe` to install.
            
            **Note:** Windows may show a SmartScreen warning. Click "More info" → "Run anyway" to install.
            
            ### Auto-Update
            If you already have FaceConnect installed, it will automatically update to this version.
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            frontend/dist/*.exe
            frontend/dist/*.exe.blockmap
            frontend/dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
