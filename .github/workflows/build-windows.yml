name: Build Windows App (Signed)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish as GitHub Release'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from package.json
        id: version
        shell: powershell
        run: |
          $version = (Get-Content frontend/package.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Check Secrets
        shell: powershell
        run: |
          if ("${{ secrets.CERTIFICATE_BASE64 }}" -eq "") {
            Write-Error "CERTIFICATE_BASE64 secret is not set!"
            exit 1
          }
          if ("${{ secrets.CERTIFICATE_PASSWORD }}" -eq "") {
            Write-Warning "CERTIFICATE_PASSWORD secret is empty - building WITHOUT code signing"
            echo "SKIP_SIGNING=true" >> $env:GITHUB_ENV
          } else {
            Write-Host "All secrets found - will sign the application"
            echo "SKIP_SIGNING=false" >> $env:GITHUB_ENV
          }

      - name: Decode Certificate
        if: env.SKIP_SIGNING != 'true'
        shell: powershell
        run: |
          try {
            $certBase64 = "${{ secrets.CERTIFICATE_BASE64 }}"
            $certBytes = [Convert]::FromBase64String($certBase64)
            $certPath = "$env:RUNNER_TEMP\certificate.pfx"
            [IO.File]::WriteAllBytes($certPath, $certBytes)
            Write-Host "Certificate decoded successfully"
            Write-Host "Certificate size: $($certBytes.Length) bytes"
            
            # Verify the certificate can be loaded
            $password = ConvertTo-SecureString -String "${{ secrets.CERTIFICATE_PASSWORD }}" -AsPlainText -Force
            $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2($certPath, $password)
            Write-Host "Certificate Subject: $($cert.Subject)"
            Write-Host "Certificate Issuer: $($cert.Issuer)"
            Write-Host "Certificate Valid Until: $($cert.NotAfter)"
          } catch {
            Write-Error "Failed to decode or verify certificate: $_"
            exit 1
          }

      - name: Install and Build
        shell: powershell
        run: |
          cd frontend
          npm install -g yarn
          yarn install --ignore-engines
          $env:CI="false"
          $env:DISABLE_ESLINT_PLUGIN="true"
          $env:REACT_APP_BACKEND_URL="https://profile-connector-3.preview.emergentagent.com"
          $env:GENERATE_SOURCEMAP="false"
          yarn build
        env:
          REACT_APP_BACKEND_URL: https://profile-connector-3.preview.emergentagent.com

      - name: Build Electron App (Signed)
        if: env.SKIP_SIGNING != 'true'
        shell: powershell
        run: |
          cd frontend
          $env:CSC_LINK = "$env:RUNNER_TEMP\certificate.pfx"
          $env:CSC_KEY_PASSWORD = "${{ secrets.CERTIFICATE_PASSWORD }}"
          Write-Host "CSC_LINK set to: $env:CSC_LINK"
          Write-Host "CSC_KEY_PASSWORD is set: $($env:CSC_KEY_PASSWORD.Length -gt 0)"
          npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron App (Unsigned)
        if: env.SKIP_SIGNING == 'true'
        shell: powershell
        run: |
          cd frontend
          npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FaceConnect-Setup-v${{ steps.version.outputs.VERSION }}
          path: |
            frontend/dist/*.exe
            frontend/dist/*.exe.blockmap
            frontend/dist/latest.yml
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: FaceConnect v${{ steps.version.outputs.VERSION }}
          body: |
            ## FaceConnect v${{ steps.version.outputs.VERSION }}
            
            ### Installation
            Download and run `FaceConnect-Setup-${{ steps.version.outputs.VERSION }}.exe` to install.
            
            ### Auto-Update
            If you already have FaceConnect installed, it will automatically update to this version.
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            frontend/dist/*.exe
            frontend/dist/*.exe.blockmap
            frontend/dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Certificate
        if: always()
        shell: powershell
        run: |
          $certPath = "$env:RUNNER_TEMP\certificate.pfx"
          if (Test-Path $certPath) {
            Remove-Item $certPath -Force
            Write-Host "Certificate cleaned up"
          }
