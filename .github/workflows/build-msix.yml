name: Build MSIX for Microsoft Store

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 2.5.5)'
        required: true
        default: '2.5.5'

jobs:
  build-msix:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --ignore-engines

      - name: Build React app
        working-directory: frontend
        shell: powershell
        run: |
          $env:CI="false"
          $env:DISABLE_ESLINT_PLUGIN="true"
          $env:REACT_APP_BACKEND_URL="https://profile-connector-3.preview.emergentagent.com"
          $env:GENERATE_SOURCEMAP="false"
          yarn build

      - name: Update version in package.json
        working-directory: frontend
        run: |
          $json = Get-Content package.json | ConvertFrom-Json
          $json.version = "${{ github.event.inputs.version }}"
          $json | ConvertTo-Json -Depth 100 | Set-Content package.json
        shell: pwsh

      - name: Build MSIX package
        working-directory: frontend
        run: npx electron-builder --win appx --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: FaceConnect-MSIX-${{ github.event.inputs.version }}
          path: frontend/dist/*.appx
          retention-days: 30
          if-no-files-found: warn
