name: Build Android APK/AAB

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile
      
      - name: Build React app
        working-directory: frontend
        run: yarn build
        env:
          REACT_APP_BACKEND_URL: https://profile-connector-3.preview.emergentagent.com
          GENERATE_SOURCEMAP: false
      
      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android
      
      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew
      
      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug
      
      - name: Build Release APK
        working-directory: frontend/android
        run: ./gradlew assembleRelease
      
      - name: Build Release AAB (for Play Store)
        working-directory: frontend/android
        run: ./gradlew bundleRelease
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FaceConnect-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FaceConnect-release-apk
          path: frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
      
      - name: Upload Release AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: FaceConnect-release-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
