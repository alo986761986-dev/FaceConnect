name: Build Android APK/AAB

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
      
      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      
      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile
      
      - name: Build React app
        working-directory: frontend
        run: yarn build
        env:
          REACT_APP_BACKEND_URL: https://profile-connector-3.preview.emergentagent.com
          GENERATE_SOURCEMAP: false
      
      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android
      
      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew
      
      - name: Generate Gradle Wrapper
        working-directory: frontend/android
        run: |
          # Regenerate gradle wrapper to ensure gradle-wrapper.jar exists
          gradle wrapper --gradle-version 8.0.2
      
      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug
      
      # Decode keystore for signing (if secrets are configured)
      - name: Decode Keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > frontend/android/app/faceconnect-release.keystore
          echo "Keystore decoded successfully"
      
      # Build signed release if keystore is available
      - name: Build Signed Release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        working-directory: frontend/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/faceconnect-release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD
      
      # Build signed AAB for Play Store
      - name: Build Signed Release AAB (for Play Store)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        working-directory: frontend/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/faceconnect-release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD
      
      # Build unsigned versions if no keystore
      - name: Build Unsigned Release APK (no keystore)
        if: ${{ env.KEYSTORE_BASE64 == '' }}
        working-directory: frontend/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew assembleRelease
      
      - name: Build Unsigned Release AAB (no keystore)
        if: ${{ env.KEYSTORE_BASE64 == '' }}
        working-directory: frontend/android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: ./gradlew bundleRelease
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FaceConnect-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FaceConnect-release-apk
          path: frontend/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
      
      - name: Upload Release AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: FaceConnect-release-aab
          path: frontend/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
      
      # Clean up keystore
      - name: Clean up keystore
        if: always()
        run: rm -f frontend/android/app/faceconnect-release.keystore
