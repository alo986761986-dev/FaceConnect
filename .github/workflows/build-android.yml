name: Build Android APK/AAB

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
      
      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0.2'
      
      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile
      
      - name: Build React app
        working-directory: frontend
        run: yarn build
        env:
          REACT_APP_BACKEND_URL: https://www.faceconnect.com
          GENERATE_SOURCEMAP: false
      
      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android
      
      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew
      
      - name: Ensure Gradle Wrapper exists
        working-directory: frontend/android
        run: |
          mkdir -p gradle/wrapper
          # Create gradle-wrapper.properties with correct content
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0.2-all.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          # If gradle-wrapper.jar doesn't exist, generate it using system gradle
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Generating Gradle wrapper JAR using system Gradle..."
            gradle wrapper --gradle-version=8.0.2 --distribution-type=all
            echo "Gradle wrapper generated successfully"
          fi
          echo "Gradle wrapper files:"
          ls -la gradle/wrapper/
      
      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug
      
      # Check if signing secrets are available
      - name: Check signing secrets
        id: check-secrets
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi
      
      # Decode keystore for signing (if secrets are configured)
      - name: Decode Keystore
        if: steps.check-secrets.outputs.has_keystore == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > frontend/android/app/faceconnect-release.keystore
          echo "Keystore decoded successfully"
      
      # Build signed release if keystore is available
      - name: Build Signed Release APK
        if: steps.check-secrets.outputs.has_keystore == 'true'
        working-directory: frontend/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease
      
      # Build signed AAB for Play Store
      - name: Build Signed Release AAB (for Play Store)
        if: steps.check-secrets.outputs.has_keystore == 'true'
        working-directory: frontend/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease
      
      # Build unsigned versions if no keystore (will produce unsigned APK)
      - name: Build Unsigned Release APK (no keystore)
        if: steps.check-secrets.outputs.has_keystore == 'false'
        working-directory: frontend/android
        run: ./gradlew assembleRelease
      
      - name: Build Unsigned Release AAB (no keystore)
        if: steps.check-secrets.outputs.has_keystore == 'false'
        working-directory: frontend/android
        run: ./gradlew bundleRelease
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FaceConnect-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FaceConnect-release-apk
          path: frontend/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
      
      - name: Upload Release AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: FaceConnect-release-aab
          path: frontend/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
      
      # Clean up keystore
      - name: Clean up keystore
        if: always()
        run: rm -f frontend/android/app/faceconnect-release.keystore
